# Minimal nginx config for the React SPA container.
# This is NOT the reverse-proxy config — that lives in nginx/nginx.conf.
# This config only handles serving static files + SPA fallback routing.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long-lived cache headers
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # All other routes fall back to index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
