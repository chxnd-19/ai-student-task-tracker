version: "3.9"

# ── Student Task Tracker — Docker Compose ─────────────────────────────────────
# Start everything:  docker-compose up --build
# Stop everything:   docker-compose down
# Wipe volumes:      docker-compose down -v

services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:6
    container_name: stt_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"          # expose for local tools (Compass, mongosh)
    volumes:
      - mongo_data:/data/db    # persist data across restarts
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stt_backend
    restart: unless-stopped
    ports:
      - "8000:8000"            # direct access for debugging; Nginx is the real entry point
    environment:
      # MongoDB — use the Docker service name, not localhost
      MONGO_URI: "mongodb://mongodb:27017/student-task-tracker"
      DB_NAME: "student-task-tracker"
      # JWT — override in production with a real secret
      JWT_SECRET: "${JWT_SECRET:-change_this_in_production_min_32_chars}"
      # CORS — Nginx is the public entry point on port 80
      FRONTEND_URL: "http://localhost"
      # Production mode: WARNING logs, restricted CORS
      ENVIRONMENT: "production"
      PORT: "8000"
      UPLOAD_DIR: "uploads"
    volumes:
      # Persist uploaded files across container restarts
      - uploads_data:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Flask Analytics Microservice ─────────────────────────────────────────────
  flask_service:
    build:
      context: ./flask_service
      dockerfile: Dockerfile
    container_name: stt_flask
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      MONGO_URI: "mongodb://mongodb:27017/student-task-tracker"
      DB_NAME: "student-task-tracker"
      FRONTEND_URL: "http://localhost"
      FLASK_PORT: "5001"
      ENVIRONMENT: "production"
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── React Frontend ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty string = same-origin; Nginx proxies /api → backend
        VITE_API_URL: ""
    container_name: stt_frontend
    restart: unless-stopped
    ports:
      - "3000:80"              # direct access for debugging

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: stt_nginx
    restart: unless-stopped
    ports:
      - "80:80"                # public entry point
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - flask_service
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Prometheus Monitoring ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: stt_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"            # Prometheus UI
    depends_on:
      - nginx

  # ── Grafana Dashboards ───────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: stt_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"            # Grafana UI (host port 3001)
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  uploads_data:
    driver: local
  grafana_data:
    driver: local
