# ── Nginx Reverse Proxy ────────────────────────────────────────────────────────
# Entry point for all traffic.
# Routes:
#   /api/*        → FastAPI backend  (port 5000)
#   /uploads/*    → FastAPI backend  (port 5000, static files)
#   /analytics/*  → Flask service    (port 5001)
#   /             → React frontend   (port 80)

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rid=$http_x_request_id';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;

    # ── Upstream definitions ───────────────────────────────────────────────────
    upstream backend {
        server backend:5000;
    }

    upstream flask_service {
        server flask_service:5001;
    }

    upstream frontend {
        server frontend:80;
    }

    # ── Main server block ──────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Max upload size — matches FastAPI MAX_FILE_SIZE_MB=5
        client_max_body_size 6M;

        # ── Shared proxy headers ───────────────────────────────────────────────
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # ── FastAPI — API routes ───────────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend;

            # Timeouts for long-running requests (e.g. analytics)
            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
            proxy_connect_timeout 10s;
        }

        # ── FastAPI — uploaded file serving ───────────────────────────────────
        location /uploads/ {
            proxy_pass http://backend;
            proxy_read_timeout 30s;
        }

        # ── Prometheus metrics (FastAPI) ──────────────────────────────────────
        location /metrics {
            proxy_pass http://backend;
            proxy_read_timeout 10s;
        }

        # ── Flask analytics microservice ──────────────────────────────────────
        # Accessible at /analytics/* — strips the prefix before forwarding.
        location /analytics/ {
            proxy_pass http://flask_service/;
            proxy_read_timeout 60s;
        }

        # ── React SPA ─────────────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_read_timeout 30s;
        }
    }
}
